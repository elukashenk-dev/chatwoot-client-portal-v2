      .auth-header-fade {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 112px;
        pointer-events: none;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.18) 28%,
          rgba(255, 255, 255, 0.72) 68%,
          #fff 100%
        );
      }

      .brand-mark {
        position: absolute;
        top: 40px;
        left: 24px;
        display: flex;
        width: max-content;
        max-width: 176px;
        flex-direction: column;
        align-items: center;
      }

      .brand-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        margin-bottom: 10px;
        border-radius: 15px;
        background: var(--brand-900);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        line-height: 1;
        box-shadow: 0 2px 8px rgba(15, 45, 87, 0.12);
      }

      .brand-name {
        max-width: 176px;
        margin: 0;
        overflow: hidden;
        color: rgba(35, 71, 118, 0.85);
        font-size: 11px;
        font-weight: 700;
        line-height: 1.15;
        text-align: center;
        text-overflow: ellipsis;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .brand-line {
        width: 48px;
        height: 1px;
        margin-top: 8px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--brand-200),
          transparent
        );
      }

      .content {
        position: relative;
        z-index: 10;
        padding: calc(var(--spacing) * 2) 28px 28px;
      }

      .intro {
        text-align: center;
      }

      h1 {
        margin: 0;
        color: var(--ink);
        font-size: clamp(28px, 8.2vw, 32px);
        font-weight: 700;
        letter-spacing: 0;
        line-height: 1.08;
      }

      .subtitle {
        max-width: 355px;
        margin: 16px auto 0;
        color: #64748b;
        font-size: 17px;
        line-height: 1.5;
      }

      .form {
        display: grid;
        gap: 24px;
        margin-top: 28px;
      }

      .field {
        position: relative;
      }

      .field-icon {
        position: absolute;
        left: 20px;
        top: 50%;
        display: flex;
        width: 28px;
        height: 28px;
        align-items: center;
        justify-content: center;
        color: #64748b;
        transform: translateY(-50%);
        pointer-events: none;
      }

      .field input {
        display: block;
        width: 100%;
        height: 68px;
        border: 1px solid var(--line);
        border-radius: 0.6rem;
        background: var(--field);
        color: #0f172a;
        font-size: 18px;
        outline: none;
        padding: 0 64px;
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease;
      }

      .field input::placeholder {
        color: #94a3b8;
        opacity: 1;
      }

      .field input:not(:placeholder-shown) {
        border-color: var(--brand-300);
        box-shadow: 0 6px 14px rgba(15, 45, 87, 0.06);
      }

      .field input:focus {
        border-color: var(--brand-700);
        box-shadow:
          0 0 0 4px var(--brand-100),
          0 6px 14px rgba(15, 45, 87, 0.06);
      }

      .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        display: inline-flex;
        width: 40px;
        height: 40px;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 0.6rem;
        background: transparent;
        color: #94a3b8;
        transform: translateY(-50%);
      }

      .primary-button {
        display: inline-flex;
        min-height: 56px;
        width: 100%;
        align-items: center;
        justify-content: center;
        gap: 12px;
        border: 0;
        border-radius: 0.6rem;
        background: var(--brand-900);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        box-shadow: 0 8px 18px rgba(17, 37, 64, 0.18);
      }

      .auth-links {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 12px;
        margin-top: 20px;
        font-size: 14px;
      }

      .auth-link {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        gap: 12px;
        border-radius: 0.75rem;
        color: var(--brand-800);
        font-weight: 600;
        text-decoration: none;
      }

      .auth-link:last-child {
        justify-content: flex-end;
      }

      .link-icon {
        display: inline-flex;
        width: 40px;
        height: 40px;
        flex-shrink: 0;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: #f1f5f9;
        color: var(--brand-700);
      }

      .auth-link-divider {
        width: 1px;
        height: 28px;
        background: #e2e8f0;
      }

      .info-panel {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        margin-top: 16px;
        border-radius: 0.9rem;
        background: rgba(241, 245, 249, 0.8);
        color: #475569;
        font-size: 14px;
        line-height: 1.7;
        padding: 16px;
        box-shadow: 0 2px 8px rgba(15, 45, 87, 0.05);
      }

      .info-panel p {
        margin: 0;
      }

      .info-icon {
        display: inline-flex;
        width: 40px;
        height: 40px;
        flex-shrink: 0;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--brand-200);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--brand-700);
      }

      svg {
        display: block;
      }

      @media (min-width: 361px) {
        .brand-mark {
          left: 28px;
          top: 42px;
        }
      }

      @media (min-width: 390px) {
        .auth-header-shell {
          height: 300px;
        }
      }

      @media (min-width: 430px) {
        .auth-header-shell {
          height: 320px;
        }
        .auth-header-fade {
          height: 136px;
        }
        .brand-mark {
          left: 51px;
          top: 64px;
        }
        .brand-logo {
          width: 56px;
          height: 56px;
          margin-bottom: 12px;
          border-radius: 18px;
          font-size: 18px;
        }
        .brand-name {
          font-size: 12px;
        }
        .brand-line {
          width: 56px;
          margin-top: 10px;
        }
        .content {
          padding-left: 40px;
          padding-right: 40px;
          padding-bottom: 32px;
          padding-top: calc(var(--spacing) * 3);
        }
        .auth-links {
          font-size: 15px;
        }
      }

      @media (max-width: 340px) {
        .content {
          padding-left: 28px;
          padding-right: 28px;
        }
        .auth-link {
          gap: 10px;
        }
        .auth-link span:last-child {
          max-width: 74px;
        }
        .info-panel {
          gap: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="viewport">
      <section class="auth-frame" aria-label="Центр поддержки">
        <div class="auth-footer-art" aria-hidden="true"></div>

        <header class="auth-header-shell">
          <div class="auth-header-art" aria-hidden="true"></div>
          <div class="auth-header-fade" aria-hidden="true"></div>
          <div class="brand-mark" aria-label="Стройфирма">
            <div class="brand-logo">СТ</div>
            <p class="brand-name">Стройфирма</p>
            <div class="brand-line" aria-hidden="true"></div>
          </div>
        </header>

        <div class="content">
          <div class="intro">
            <h1>Центр поддержки</h1>
            <p class="subtitle">Войдите, чтобы продолжить переписку.</p>
          </div>

          <form class="form" action="#" novalidate>
            <label class="field">
              <span class="field-icon" aria-hidden="true">
                <svg
                  width="28"
                  height="28"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.45"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect height="16" rx="2.5" width="20" x="2" y="4" />
                  <path d="m22 7-8.95 5.7a2 2 0 0 1-2.1 0L2 7" />
                </svg>
              </span>
              <input
                aria-label="Email"
                autocomplete="email"
                inputmode="email"
                placeholder="name@company.ru"
                type="email"
              />
            </label>

            <label class="field">
              <span class="field-icon" aria-hidden="true">
                <svg
                  width="28"
                  height="28"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.45"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect height="11" rx="2.5" width="18" x="3" y="10" />
                  <path d="M7 10V7a5 5 0 0 1 10 0v3" />
                  <path d="M12 15.5v2" />
                </svg>
              </span>
              <input
                id="password"
                aria-label="Пароль"
                autocomplete="current-password"
                placeholder="Введите пароль"
                type="password"
              />
              <button
                class="password-toggle"
                type="button"
                aria-label="Показать пароль"
                onclick="
                  const input = document.getElementById('password')
                  input.type = input.type === 'password' ? 'text' : 'password'
                "
              >
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.45"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </label>

            <button class="primary-button" type="submit">
              <svg
                width="28"
                height="28"
                viewBox="0 0 32 32"
                fill="none"
                stroke="currentColor"
                stroke-width="1.25"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path
                  d="M16 2 27.35 6.75v8.95c0 7.45-4.85 12.55-11.35 15-6.5-2.45-11.35-7.55-11.35-15V6.75L16 2Z"
                  stroke-width="1.8"
                />
                <path
                  d="M13.65 16v-1.65A2.35 2.35 0 0 1 16 12a2.35 2.35 0 0 1 2.35 2.35V16"
                />
                <rect height="5.75" rx="1.2" width="6.9" x="12.55" y="15.45" />
                <path d="M16 18.05v1.25" />
              </svg>
              Войти
            </button>
          </form>

          <nav class="auth-links" aria-label="Дополнительные действия">
            <a class="auth-link" href="#">
              <span class="link-icon" aria-hidden="true"
                ><svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.45"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect height="11" rx="2.5" width="18" x="3" y="10" />
                  <path d="M7 10V7a5 5 0 0 1 10 0v3" />
                  <path d="M12 15.5v2" /></svg
              ></span>
              <span>Забыли пароль?</span>
            </a>
            <span class="auth-link-divider" aria-hidden="true"></span>
            <a class="auth-link" href="#">
              <span class="link-icon" aria-hidden="true"
                ><svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.45"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M15 19a6 6 0 0 0-10.5 0" />
                  <circle cx="9" cy="8" r="3.5" />
                  <path d="M19 8v6" />
                  <path d="M16 11h6" /></svg
              ></span>
              <span>Создать аккаунт</span>
            </a>
          </nav>

          <aside class="info-panel">
            <span class="info-icon" aria-hidden="true"
              ><svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.45"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="9" />
                <path d="M12 11v5" />
                <path d="M12 7.5h.01" /></svg
            ></span>
            <p>
              Если у вас еще нет доступа, запросите его по email, который уже
              известен вашей компании.
            </p>
          </aside>
        </div>
      </section>
    </main>
  </body>
</html>
