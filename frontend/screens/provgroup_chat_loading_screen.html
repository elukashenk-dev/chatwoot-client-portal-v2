<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>ProvGroup Клиентский портал — Загрузка переписки</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#f3f7fc',
                100: '#e7eef8',
                200: '#c4d5ed',
                300: '#9cb9df',
                400: '#6d96cb',
                500: '#4676b4',
                600: '#315d97',
                700: '#234776',
                800: '#173258',
                900: '#112540'
              }
            },
            boxShadow: {
              card: '0 18px 50px rgba(15, 23, 42, 0.14)'
            },
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif']
            },
            keyframes: {
              shimmer: {
                '0%': { backgroundPosition: '200% 0' },
                '100%': { backgroundPosition: '-200% 0' }
              },
              pulseSoft: {
                '0%, 100%': { opacity: '0.5' },
                '50%': { opacity: '1' }
              }
            },
            animation: {
              shimmer: 'shimmer 2.2s linear infinite',
              pulseSoft: 'pulseSoft 1.8s ease-in-out infinite'
            }
          }
        }
      }
    </script>
    <style>
      .portal-shell::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(243, 247, 252, 0.95) 0%, rgba(255, 255, 255, 0) 18%);
        pointer-events: none;
      }
      .portal-shell::after {
        content: '';
        position: absolute;
        right: 44px;
        top: 118px;
        width: 96px;
        height: 96px;
        border-radius: 9999px;
        background: rgba(196, 213, 237, 0.24);
        filter: blur(34px);
        pointer-events: none;
      }
      .corner-accent {
        position: absolute;
        width: 54px;
        height: 54px;
        pointer-events: none;
      }
      .corner-accent::before,
      .corner-accent::after {
        content: '';
        position: absolute;
        display: block;
      }
      .corner-accent--tl {
        left: 28px;
        top: 28px;
      }
      .corner-accent--tl::before {
        left: 0;
        top: 0;
        width: 50px;
        height: 1px;
        background: linear-gradient(90deg, rgba(196, 213, 237, 0.95) 0%, rgba(196, 213, 237, 0.72) 38%, rgba(196, 213, 237, 0) 100%);
      }
      .corner-accent--tl::after {
        left: 0;
        top: 0;
        width: 1px;
        height: 50px;
        background: linear-gradient(180deg, rgba(196, 213, 237, 0.95) 0%, rgba(196, 213, 237, 0.72) 38%, rgba(196, 213, 237, 0) 100%);
      }
      .corner-accent--tr {
        right: 28px;
        top: 28px;
      }
      .corner-accent--tr::before {
        right: 0;
        top: 0;
        width: 50px;
        height: 1px;
        background: linear-gradient(270deg, rgba(196, 213, 237, 0.95) 0%, rgba(196, 213, 237, 0.72) 38%, rgba(196, 213, 237, 0) 100%);
      }
      .corner-accent--tr::after {
        right: 0;
        top: 0;
        width: 1px;
        height: 50px;
        background: linear-gradient(180deg, rgba(196, 213, 237, 0.95) 0%, rgba(196, 213, 237, 0.72) 38%, rgba(196, 213, 237, 0) 100%);
      }
      .dot-grid {
        position: absolute;
        right: 64px;
        top: 160px;
        width: 88px;
        height: 88px;
        opacity: 0.3;
        background-image: radial-gradient(circle, rgba(35, 71, 118, 0.12) 1px, transparent 1px);
        background-size: 12px 12px;
        pointer-events: none;
      }
      .skeleton {
        background: linear-gradient(90deg, rgba(226,232,240,0.85) 25%, rgba(241,245,249,1) 50%, rgba(226,232,240,0.85) 75%);
        background-size: 200% 100%;
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-200 text-slate-900 antialiased">
    <div class="mx-auto flex min-h-screen w-full items-center justify-center sm:p-6">
      <div class="portal-shell relative flex min-h-screen w-full flex-col overflow-hidden bg-white sm:min-h-[920px] sm:max-w-[750px] sm:rounded-[28px] sm:shadow-card lg:h-[calc(100vh-48px)] lg:max-h-[1060px]">
        <div class="corner-accent corner-accent--tl"></div>
        <div class="corner-accent corner-accent--tr"></div>
        <div class="dot-grid hidden sm:block"></div>

        <header class="relative z-10 border-b border-slate-200/90 bg-white/92 px-5 py-4 backdrop-blur-sm sm:px-6">
          <div class="flex items-start justify-between gap-4">
            <div class="flex min-w-0 items-center gap-3">
              <button type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-[0.7rem] border border-slate-200 bg-white text-slate-400" aria-label="Назад" disabled>
                <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"></path></svg>
              </button>
              <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-[0.85rem] bg-brand-900 text-sm font-semibold tracking-wide text-white">PG</div>
              <div class="min-w-0">
                <div class="flex items-center gap-2">
                  <h1 class="truncate text-[17px] font-semibold text-slate-900">Поставка документов по договору</h1>
                </div>
                <div class="mt-1 flex flex-wrap items-center gap-x-3 gap-y-1 text-[13px] text-slate-500">
                  <span>Агент: Анна Смирнова</span>
                  <span>•</span>
                  <span class="inline-flex rounded-full bg-emerald-50 px-2 py-0.5 text-[11px] font-medium text-emerald-700">Авторизация выполнена</span>
                </div>
              </div>
            </div>
          </div>
        </header>

        <main class="relative z-10 flex min-h-0 flex-1 flex-col bg-transparent">
          <div class="border-b border-slate-200/70 px-5 py-3 sm:px-6">
            <div class="flex items-center justify-between gap-3">
              <div class="inline-flex min-h-10 items-center gap-2 rounded-[0.7rem] border border-slate-200 bg-white px-3 text-[13px] font-medium text-slate-400">
                <svg class="h-[16px] w-[16px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 2v4"></path><path d="M16 2v4"></path><rect width="18" height="18" x="3" y="4" rx="2"></rect><path d="M3 10h18"></path></svg>
                Календарь сообщений
              </div>
              <span class="rounded-full border border-brand-100 bg-brand-50 px-2.5 py-1 text-[12px] font-medium text-brand-700">Загружаем последние 20 сообщений</span>
            </div>
          </div>

          <section class="flex-1 overflow-hidden px-4 py-5 sm:px-6 sm:py-6">
            <div class="mx-auto flex h-full w-full max-w-[620px] flex-col">
              <div class="mb-6 rounded-[1.2rem] border border-slate-200 bg-slate-50/90 px-5 py-5">
                <div class="flex items-start gap-4">
                  <div class="inline-flex h-11 w-11 shrink-0 items-center justify-center rounded-[0.9rem] bg-brand-100 text-brand-800 animate-pulseSoft">
                    <svg class="h-[20px] w-[20px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v6l4 2"></path><circle cx="12" cy="12" r="9"></circle></svg>
                  </div>
                  <div class="min-w-0">
                    <h2 class="text-[16px] font-semibold text-slate-800">Загружаем переписку...</h2>
                    <p class="mt-1 text-[14px] leading-6 text-slate-500">
                      Вход выполнен успешно. Сейчас подтягиваем историю сообщений и состояние текущего обращения.
                    </p>
                  </div>
                </div>
              </div>

              <div class="flex-1 space-y-4 overflow-hidden">
                <div class="flex justify-start">
                  <div class="max-w-[78%] space-y-2">
                    <div class="skeleton animate-shimmer h-3 w-24 rounded-full"></div>
                    <div class="skeleton animate-shimmer h-[88px] rounded-[1.1rem] rounded-tl-[0.45rem]"></div>
                    <div class="skeleton animate-shimmer h-[72px] w-[88%] rounded-[1.1rem] rounded-tl-[0.7rem]"></div>
                  </div>
                </div>

                <div class="flex justify-end">
                  <div class="max-w-[78%] space-y-2">
                    <div class="ml-auto skeleton animate-shimmer h-3 w-20 rounded-full"></div>
                    <div class="skeleton animate-shimmer h-[108px] rounded-[1.1rem] rounded-tr-[0.45rem]"></div>
                    <div class="skeleton animate-shimmer h-[122px] rounded-[1.1rem] rounded-tr-[0.7rem]"></div>
                  </div>
                </div>

                <div class="flex justify-start">
                  <div class="max-w-[72%] space-y-2">
                    <div class="skeleton animate-shimmer h-3 w-28 rounded-full"></div>
                    <div class="skeleton animate-shimmer h-[76px] rounded-[1.1rem] rounded-tl-[0.45rem]"></div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <footer class="border-t border-slate-200/90 bg-white/94 px-4 py-4 backdrop-blur-sm sm:px-6">
            <div class="mx-auto w-full max-w-[620px]">
              <div class="mb-3 h-10 rounded-[0.9rem] skeleton animate-shimmer"></div>
              <div class="rounded-[1rem] border border-slate-200 bg-slate-50/90 p-2">
                <div class="flex items-end gap-2">
                  <div class="h-11 w-11 shrink-0 rounded-[0.75rem] skeleton animate-shimmer"></div>
                  <div class="h-[44px] flex-1 rounded-[0.8rem] skeleton animate-shimmer"></div>
                  <div class="h-11 w-11 shrink-0 rounded-[0.75rem] skeleton animate-shimmer"></div>
                  <div class="h-11 w-11 shrink-0 rounded-[0.75rem] skeleton animate-shimmer"></div>
                </div>
              </div>
            </div>
          </footer>
        </main>
      </div>
    </div>
  </body>
</html>
