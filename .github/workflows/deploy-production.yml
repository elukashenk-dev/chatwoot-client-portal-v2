name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      commit:
        description: Full lowercase 40-character origin/main commit SHA.
        required: true
        type: string
      phase:
        description: Prepare without cutover, or activate an existing preparation.
        required: true
        type: choice
        options:
          - prepare
          - activate
      migration_policy:
        description: Empty unless the prepared release is migration-sensitive.
        required: false
        type: string
      approval_ref:
        description: Required with a migration policy; never a secret.
        required: false
        type: string

concurrency:
  cancel-in-progress: false
  group: production

jobs:
  deploy:
    environment: production
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Run staged production deployment
        env:
          APPROVAL_REF: ${{ inputs.approval_ref }}
          COMMIT: ${{ inputs.commit }}
          MIGRATION_POLICY: ${{ inputs.migration_policy }}
          PHASE: ${{ inputs.phase }}
          SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          SSH_KNOWN_HOSTS: ${{ secrets.PRODUCTION_SSH_KNOWN_HOSTS }}
          SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
        run: |
          set -Eeuo pipefail

          fail() {
            printf '%s\n' "$1" >&2
            exit 2
          }

          require_nonempty() {
            local name="$1"
            local value="$2"

            [[ -n "$value" ]] || fail "Missing required production secret: $name"
          }

          require_nonempty SSH_HOST "$SSH_HOST"
          require_nonempty SSH_USER "$SSH_USER"
          require_nonempty SSH_PRIVATE_KEY "$SSH_PRIVATE_KEY"
          require_nonempty SSH_KNOWN_HOSTS "$SSH_KNOWN_HOSTS"

          [[ "$COMMIT" =~ ^[0-9a-f]{40}$ ]] || fail 'Commit must be a full lowercase SHA.'
          case "$PHASE" in
            prepare)
              [[ -z "$MIGRATION_POLICY" && -z "$APPROVAL_REF" ]] ||
                fail 'Prepare does not accept migration policy or approval reference.'
              ;;
            activate)
              if [[ -n "$MIGRATION_POLICY" || -n "$APPROVAL_REF" ]]; then
                [[ -n "$MIGRATION_POLICY" && -n "$APPROVAL_REF" ]] ||
                  fail 'Migration policy and approval reference are required together.'
                [[ "$MIGRATION_POLICY" == 'backward-compatible' || "$MIGRATION_POLICY" == 'forward-only' ]] ||
                  fail 'Migration policy must be backward-compatible or forward-only.'
              fi
              ;;
            *)
              fail 'Phase must be prepare or activate.'
              ;;
          esac

          umask 077
          printf '%s\n' "$SSH_PRIVATE_KEY" >"$RUNNER_TEMP/production_deploy_key"
          printf '%s\n' "$SSH_KNOWN_HOSTS" >"$RUNNER_TEMP/production_known_hosts"
          chmod 600 "$RUNNER_TEMP/production_deploy_key" "$RUNNER_TEMP/production_known_hosts"

          args=(
            "scripts/deploy-production-staged.sh"
            "$PHASE"
            "--host=$SSH_USER@$SSH_HOST"
            "--ssh-port=$SSH_PORT"
            "--identity-file=$RUNNER_TEMP/production_deploy_key"
            "--app-path=/opt/chatwoot-client-portal-v2"
            "--commit=$COMMIT"
            "--known-hosts-file=$RUNNER_TEMP/production_known_hosts"
          )
          [[ -n "$MIGRATION_POLICY" ]] && args+=("--migration-policy=$MIGRATION_POLICY")
          [[ -n "$APPROVAL_REF" ]] && args+=("--approval-ref=$APPROVAL_REF")
          "${args[@]}"
