name: chatwoot-client-portal-v2

services:
  portal-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PORTAL_V2_POSTGRES_DB:?set PORTAL_V2_POSTGRES_DB}
      POSTGRES_PASSWORD: ${PORTAL_V2_POSTGRES_PASSWORD:?set PORTAL_V2_POSTGRES_PASSWORD}
      POSTGRES_USER: ${PORTAL_V2_POSTGRES_USER:?set PORTAL_V2_POSTGRES_USER}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${PORTAL_V2_POSTGRES_USER:?set PORTAL_V2_POSTGRES_USER} -d ${PORTAL_V2_POSTGRES_DB:?set PORTAL_V2_POSTGRES_DB}',
        ]
      interval: 5s
      retries: 12
      start_period: 10s
      timeout: 5s
    networks:
      - portal-internal
    volumes:
      - portal-db-data:/var/lib/postgresql/data

  portal-object-storage:
    image: ${PORTAL_OBJECT_STORAGE_IMAGE:-quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${PORTAL_OBJECT_STORAGE_ROOT_USER:?set PORTAL_OBJECT_STORAGE_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${PORTAL_OBJECT_STORAGE_ROOT_PASSWORD:?set PORTAL_OBJECT_STORAGE_ROOT_PASSWORD}
    expose:
      - '9000'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      retries: 12
      start_period: 10s
      timeout: 5s
    networks:
      - portal-internal
    volumes:
      - portal-object-storage-data:/data

  portal-object-storage-init:
    image: ${PORTAL_OBJECT_STORAGE_MC_IMAGE:-quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z}
    depends_on:
      portal-object-storage:
        condition: service_healthy
    environment:
      BRANDING_ASSET_STORAGE_ACCESS_KEY_ID: ${BRANDING_ASSET_STORAGE_ACCESS_KEY_ID:?set BRANDING_ASSET_STORAGE_ACCESS_KEY_ID}
      BRANDING_ASSET_STORAGE_BUCKET: ${BRANDING_ASSET_STORAGE_BUCKET:?set BRANDING_ASSET_STORAGE_BUCKET}
      BRANDING_ASSET_STORAGE_SECRET_ACCESS_KEY: ${BRANDING_ASSET_STORAGE_SECRET_ACCESS_KEY:?set BRANDING_ASSET_STORAGE_SECRET_ACCESS_KEY}
      PORTAL_OBJECT_STORAGE_ROOT_PASSWORD: ${PORTAL_OBJECT_STORAGE_ROOT_PASSWORD:?set PORTAL_OBJECT_STORAGE_ROOT_PASSWORD}
      PORTAL_OBJECT_STORAGE_ROOT_USER: ${PORTAL_OBJECT_STORAGE_ROOT_USER:?set PORTAL_OBJECT_STORAGE_ROOT_USER}
    entrypoint:
      - /bin/sh
      - /usr/local/bin/init-production-object-storage.sh
    networks:
      - portal-internal
    restart: 'no'
    volumes:
      - ../../scripts/init-production-object-storage.sh:/usr/local/bin/init-production-object-storage.sh:ro

  portal-backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    depends_on:
      portal-db:
        condition: service_healthy
      portal-object-storage-init:
        condition: service_completed_successfully
    environment:
      APP_ORIGIN: ${APP_ORIGIN:?set APP_ORIGIN}
      BRANDING_ASSET_STORAGE_ACCESS_KEY_ID: ${BRANDING_ASSET_STORAGE_ACCESS_KEY_ID:?set BRANDING_ASSET_STORAGE_ACCESS_KEY_ID}
      BRANDING_ASSET_STORAGE_BUCKET: ${BRANDING_ASSET_STORAGE_BUCKET:?set BRANDING_ASSET_STORAGE_BUCKET}
      BRANDING_ASSET_STORAGE_ENDPOINT: ${BRANDING_ASSET_STORAGE_ENDPOINT:?set BRANDING_ASSET_STORAGE_ENDPOINT}
      BRANDING_ASSET_STORAGE_FORCE_PATH_STYLE: ${BRANDING_ASSET_STORAGE_FORCE_PATH_STYLE:-true}
      BRANDING_ASSET_STORAGE_REGION: ${BRANDING_ASSET_STORAGE_REGION:-us-east-1}
      BRANDING_ASSET_STORAGE_SECRET_ACCESS_KEY: ${BRANDING_ASSET_STORAGE_SECRET_ACCESS_KEY:?set BRANDING_ASSET_STORAGE_SECRET_ACCESS_KEY}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      DEFAULT_TENANT_CHATWOOT_ACCOUNT_ID: ${DEFAULT_TENANT_CHATWOOT_ACCOUNT_ID:?set DEFAULT_TENANT_CHATWOOT_ACCOUNT_ID}
      DEFAULT_TENANT_CHATWOOT_ADMIN_VERIFICATION_TOKEN: ${DEFAULT_TENANT_CHATWOOT_ADMIN_VERIFICATION_TOKEN:-}
      DEFAULT_TENANT_CHATWOOT_API_ACCESS_TOKEN: ${DEFAULT_TENANT_CHATWOOT_API_ACCESS_TOKEN:?set DEFAULT_TENANT_CHATWOOT_API_ACCESS_TOKEN}
      DEFAULT_TENANT_CHATWOOT_BASE_URL: ${DEFAULT_TENANT_CHATWOOT_BASE_URL:?set DEFAULT_TENANT_CHATWOOT_BASE_URL}
      DEFAULT_TENANT_CHATWOOT_PORTAL_INBOX_ID: ${DEFAULT_TENANT_CHATWOOT_PORTAL_INBOX_ID:?set DEFAULT_TENANT_CHATWOOT_PORTAL_INBOX_ID}
      DEFAULT_TENANT_CHATWOOT_WEBHOOK_SECRET: ${DEFAULT_TENANT_CHATWOOT_WEBHOOK_SECRET:?set DEFAULT_TENANT_CHATWOOT_WEBHOOK_SECRET}
      DEFAULT_TENANT_DISPLAY_NAME: ${DEFAULT_TENANT_DISPLAY_NAME:?set DEFAULT_TENANT_DISPLAY_NAME}
      DEFAULT_TENANT_PRIMARY_DOMAIN: ${DEFAULT_TENANT_PRIMARY_DOMAIN:?set DEFAULT_TENANT_PRIMARY_DOMAIN}
      DEFAULT_TENANT_PUBLIC_BASE_URL: ${DEFAULT_TENANT_PUBLIC_BASE_URL:?set DEFAULT_TENANT_PUBLIC_BASE_URL}
      DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:?set DEFAULT_TENANT_SLUG}
      NODE_ENV: production
      PORT: ${PORT:-3301}
      PORTAL_TENANT_SECRET_KEY: ${PORTAL_TENANT_SECRET_KEY:?set PORTAL_TENANT_SECRET_KEY}
      PORTAL_TRUST_PROXY: ${PORTAL_TRUST_PROXY:-false}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-portal_session}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-14}
      SMTP_FROM: ${SMTP_FROM:?set SMTP_FROM}
      SMTP_HOST: ${SMTP_HOST:?set SMTP_HOST}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      PUSH_SUBSCRIPTION_ALLOWED_ORIGINS: ${PUSH_SUBSCRIPTION_ALLOWED_ORIGINS:-}
      PUSH_VAPID_KEY_ID: ${PUSH_VAPID_KEY_ID:-}
      PUSH_VAPID_PRIVATE_KEY: ${PUSH_VAPID_PRIVATE_KEY:-}
      PUSH_VAPID_PUBLIC_KEY: ${PUSH_VAPID_PUBLIC_KEY:-}
      PUSH_VAPID_SUBJECT: ${PUSH_VAPID_SUBJECT:-}
    expose:
      - '3301'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3301/api/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 15s
      retries: 10
      start_period: 20s
      timeout: 5s
    networks:
      - portal-internal
    restart: unless-stopped

  portal-web:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
    depends_on:
      portal-backend:
        condition: service_healthy
    environment:
      PORTAL_CADDY_SITE_ADDRESS: ${PORTAL_CADDY_SITE_ADDRESS:?set PORTAL_CADDY_SITE_ADDRESS}
      PORTAL_DOMAIN: ${PORTAL_DOMAIN:?set PORTAL_DOMAIN}
    networks:
      - portal-internal
    ports:
      - '${PORTAL_HTTP_BIND:-0.0.0.0}:${PORTAL_HTTP_PORT:-80}:80'
      - '${PORTAL_HTTPS_BIND:-0.0.0.0}:${PORTAL_HTTPS_PORT:-443}:443'
    restart: unless-stopped
    volumes:
      - caddy-config:/config
      - caddy-data:/data

networks:
  portal-internal:
    driver: bridge

volumes:
  caddy-config:
  caddy-data:
  portal-db-data:
  portal-object-storage-data:
